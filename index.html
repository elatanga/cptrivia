<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CP JEOPARDY STUDIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                100: '#FFF9C4',
                300: '#FFF176',
                400: '#FFEE58',
                500: '#FFD700', // Classic Gold
                600: '#FDB813',
                700: '#C5A000',
                800: '#8F7400',
                900: '#5F4D00',
              },
              navy: {
                900: '#06142F',
                950: '#030A17',
              },
              richBlack: '#050505',
              matteBlack: '#121212',
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
              roboto: ['Roboto', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <!-- Fonts for Luxury Feel and Legibility -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #000000;
        color: #FFD700;
        margin: 0;
        padding: 0;
      }
      /* Reusable Roboto Bold class as requested */
      .font-roboto-bold {
        font-family: "Roboto", system-ui, sans-serif;
        font-weight: 700;
      }
      /* Custom Scrollbar for internal content */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #121212;
      }
      ::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FFD700;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script src="/runtime-config.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
